<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宮崎日機装/品質ヒヤリ心理テスト</title>
<style>
:root{
  --bg:#f6f8fc;
  --bg2:#eef3ff;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --line:#e5e7eb;
  --accent:#2563eb;
  --accent2:#7c3aed;
  --shadow:0 10px 30px rgba(17,24,39,.08);
}
*{box-sizing:border-box}
body{
  margin:0;
  background:linear-gradient(180deg,var(--bg2) 0%, var(--bg) 220px);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
}
.container{max-width:980px;margin:0 auto;padding:20px 16px 40px}
.hero{
  background:linear-gradient(135deg,#ffffff 0%, #f8fbff 100%);
  border:1px solid #edf2ff;
  border-radius:24px;
  box-shadow:var(--shadow);
  padding:28px;
  margin-bottom:18px;
}
.badge{
  display:inline-flex;align-items:center;gap:8px;
  background:#eef2ff;color:#3730a3;
  padding:8px 14px;border-radius:999px;font-size:12px;font-weight:700;margin-bottom:14px;
}
.hero-grid{display:grid;grid-template-columns:1.55fr .95fr;gap:16px;align-items:stretch}
.hero-card,.side-card,.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:20px;
  box-shadow:var(--shadow);
}
.hero-card{padding:24px}
.side-card{padding:22px;background:linear-gradient(180deg,#111827 0%, #1f2a44 100%);color:#fff}
.title{font-size:34px;line-height:1.28;font-weight:800;letter-spacing:-.02em;margin:0 0 12px}
.lead{font-size:15px;line-height:1.9;color:var(--muted);margin:0}
.side-title{font-size:14px;color:#cbd5e1;margin-bottom:8px}
.side-big{font-size:28px;font-weight:800;margin:0 0 12px}
.side-text{font-size:14px;line-height:1.9;color:#dbe4f0;margin:0}
.card{padding:24px;margin-bottom:16px}
.start-form{display:grid;grid-template-columns:1fr;gap:12px;margin:16px 0 18px}
.input-wrap{display:flex;flex-direction:column;gap:6px}
.label{font-size:13px;font-weight:700;color:#374151}
input,select{
  width:100%;padding:13px 14px;border-radius:12px;border:1px solid var(--line);
  background:#fff;color:var(--text);font-size:15px;outline:none;
}
input:focus,select:focus{border-color:#c7d2fe;box-shadow:0 0 0 4px rgba(99,102,241,.08)}
button{
  width:100%;padding:14px 18px;border:none;border-radius:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-weight:800;font-size:15px;cursor:pointer;box-shadow:0 8px 20px rgba(79,70,229,.22);
}
button:hover{transform:translateY(-1px)}
button:disabled{opacity:.55;cursor:not-allowed;transform:none}
.quiz-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.quiz-index{font-size:13px;font-weight:700;color:#4b5563}
.progress{height:8px;background:#e5e7eb;border-radius:999px;margin:10px 0 18px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;transition:width .25s ease}
.question-title{font-size:26px;line-height:1.55;font-weight:800;margin:0 0 8px}
.question-sub{font-size:13px;color:var(--muted);margin:0 0 18px}
.choice{
  padding:16px 18px;border:1px solid var(--line);border-radius:16px;margin:10px 0;cursor:pointer;
  background:#fff;transition:.18s ease;font-size:15px;line-height:1.7;
}
.choice:hover{border-color:#93c5fd;background:#f8fbff;transform:translateY(-1px);box-shadow:0 8px 16px rgba(37,99,235,.08)}
.result-wrap{display:grid;gap:16px}
.result-hero{
  background:linear-gradient(135deg,#ffffff 0%, #f8fbff 100%);
  border:1px solid #e8eeff;border-radius:24px;padding:24px;box-shadow:var(--shadow);text-align:center;
}
.result-title{font-size:28px;font-weight:900;letter-spacing:-.02em;margin:0 0 8px}
.result-copy{font-size:16px;line-height:1.9;color:#374151;margin:0 auto 14px;max-width:760px}
.chart-wrap{display:flex;justify-content:center;margin-top:8px}
.section-title{font-size:18px;font-weight:800;margin:0 0 10px}
.small{font-size:13px;line-height:1.9;color:var(--muted)}
.bullets{margin:0;padding-left:20px;color:#374151}
.bullets li{margin:8px 0;line-height:1.8}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.score-card{padding:20px;border:1px solid var(--line);border-radius:18px;background:#fff;box-shadow:var(--shadow)}
.score-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}
.score-name{font-size:18px;font-weight:800}
.score-val{font-size:14px;color:#4b5563;font-weight:700}
.bar{height:10px;background:#e5e7eb;border-radius:999px;margin:8px 0 12px;overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px}
@media (max-width: 900px){
  .hero-grid,.grid{grid-template-columns:1fr}
}
@media (max-width: 640px){
  .container{padding:14px 12px 32px}
  .hero,.card,.result-hero,.score-card{padding:18px}
  .title{font-size:28px}
  .question-title{font-size:21px}
  .result-title{font-size:24px}
}
</style>
</head>
<body>
<div class="container">

  <div id="startCard" class="hero">
    <div class="hero-grid">
      <div class="hero-card">
        <div class="badge">宮崎日機装/品質ヒヤリ心理テスト</div>
        <h1 class="title">その判断・やり方・情報は<br>本当に正しいですか？</h1>
        <p class="lead">不正の三要素である「動機」「機会」「正当化」の観点から、現場で起こりやすい判断のクセを可視化する診断です。<br>
          選択する回答は正解がありません。<br>
          <strong>追い込まれた状況で・・・</strong><br>
          不正するなら、どの不正か、最も自分の行動に近いものを直感で選んでください。</p>
        <div class="start-form">
          <div class="input-wrap">
            <label class="label" for="dept">部署</label>
            <select id="dept">
              <option value="">選択してください</option>
              <option>EN00 - EN01</option>
              <option>EN1（生産技術部）</option>
              <option>EN2（製造第一部）</option>
              <option>EN3（品質管理部）</option>
              <option>EN4（製造第二部）</option>
              <option>EN5（検査部）</option>
              <option>EN6（生産管理部）</option>
              <option>EN7（技術部）</option>
            </select>
          </div>
        </div>
        <button id="startBtn" onclick="start()">診断スタート</button>
      </div>
      <div class="side-card">
        <div class="side-title">診断内容</div>
        <div class="side-big">全 15 問</div>
        <p class="side-text">・1問ずつ直感で回答してください<br>・最後にタイプと傾向を表示します</p>
      </div>
    </div>
  </div>

  <div id="quiz" class="card" style="display:none"></div>
  <div id="result" style="display:none"></div>

</div>
<script>
const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxi433UVuiFaHle8KloJWSjDCqGCoWbOVUueklquo4cqf8z0yy4VWjLgqCXc1efXe5P/exec";

const questions = [
  {
    cat:"正当化",
    text:"少し自信のない作業を、一人で進めることになりました。<br>あなたならどうしますか？",
    choices:[
      {text:"自分で大丈夫だと判断して、そのまま進める",type:"rationalization"},
      {text:"すぐに確認できる人がいないので、そのまま進める",type:"opportunity"},
      {text:"聞きづらさがあり、相談せずに進める",type:"motive"}
    ]
  },
  {
    cat:"動機",
    text:"上司の指示と、一緒に作業している先輩のやり方が食い違っています。<br>あなたならどうしますか？",
    choices:[
      {text:"上司の指示が正しいと思っても、言いづらく先輩に合わせる",type:"motive"},
      {text:"その場で確認する手段がないので、流れに合わせて進める",type:"opportunity"},
      {text:"先輩の方が現場を分かっていると思い、そのやり方で進める",type:"rationalization"}
    ]
  },
  {
    cat:"正当化",
    text:"周囲はAで進めるつもりですが、自分はBの方が良いと感じています。<br>あなたならどうしますか？",
    choices:[
      {text:"自分の判断を優先して、Bで進める",type:"rationalization"},
      {text:"確認できる状況ではないので、そのままBで進める",type:"opportunity"},
      {text:"言い出しにくく、そのままBで進める",type:"motive"}
    ]
  },
  {
    cat:"動機",
    text:"上司や先輩が、明らかにルール違反の行動をしている場面を見ました。<br>あなたならどうしますか？",
    choices:[
      {text:"気になるが、言いづらくて何もしない",type:"motive"},
      {text:"誰も何も言わないので、そのままにする",type:"opportunity"},
      {text:"その程度なら問題ないと思う",type:"rationalization"}
    ]
  },
  {
    cat:"機会",
    text:"本来は確認が必要ですが、忙しくて一部を省略できそうです。<br>あなたならどうしますか？",
    choices:[
      {text:"焦っていて、そのまま省略して進める",type:"motive"},
      {text:"省略しても進められる状況なので、そのまま進める",type:"opportunity"},
      {text:"これまで問題がなかったので、省略しても大丈夫だと思う",type:"rationalization"}
    ]
  },
  {
    cat:"正当化",
    text:"内容に少し不安があるまま、作業を進める必要があります。<br>あなたならどうしますか？",
    choices:[
      {text:"自分の中で問題ないと判断して、そのまま進める",type:"rationalization"},
      {text:"確認できる状況ではないので、そのまま進める",type:"opportunity"},
      {text:"確認したいが言い出しづらく、そのまま進める",type:"motive"}
    ]
  },
  {
    cat:"動機",
    text:"やったことのない作業を、一人で任されました。<br>あなたならどうしますか？",
    choices:[
      {text:"不安はあるが、言いづらくそのまま一人で進める",type:"motive"},
      {text:"頼れる人がいないので、そのまま一人で進める",type:"opportunity"},
      {text:"少し見ればできると思い、そのまま進める",type:"rationalization"}
    ]
  },
  {
    cat:"機会",
    text:"作業中に製品へ軽くぶつかってしまいましたが、見た目では異常はなさそうです。<br>あなたならどうしますか？",
    choices:[
      {text:"本当は報告した方がよいと思うが、言いづらくそのままにする",type:"motive"},
      {text:"気づかれにくそうなので、そのままにする",type:"opportunity"},
      {text:"見た感じ問題なさそうなので、そのままにする",type:"rationalization"}
    ]
  },
  {
    cat:"機会",
    text:"他の人が製品に軽くぶつかったあと、そのまま作業を続けているのを見ました。<br>あなたならどうしますか？",
    choices:[
      {text:"気になるが、言いづらく何もしない",type:"motive"},
      {text:"自分には関係ないので、そのままにする",type:"opportunity"},
      {text:"本人が必要なら対応するだろうと思う",type:"rationalization"}
    ]
  },
  {
    cat:"機会",
    text:"作業中に、自分しか気づかない程度の軽いけがをしました。<br>あなたならどうしますか？",
    choices:[
      {text:"本当は伝えた方がよいと思うが、言いづらくそのままにする",type:"motive"},
      {text:"作業は続けられるので、そのまま続ける",type:"opportunity"},
      {text:"大したことはないと思い、特に何もしない",type:"rationalization"}
    ]
  },
  {
    cat:"動機",
    text:"一緒に作業している人が軽いけがをしましたが、本人は気にしていない様子です。<br>あなたならどうしますか？",
    choices:[
      {text:"気になるが、言いづらく何もしない",type:"motive"},
      {text:"自分が動かなくても問題ないと思い、そのままにする",type:"opportunity"},
      {text:"本人が大丈夫そうなら問題ないと思う",type:"rationalization"}
    ]
  },
  {
    cat:"機会",
    text:"確認した方がよいと分かっているものの、このままでも作業は進められそうです。<br>あなたならどうしますか？",
    choices:[
      {text:"急いでいるので、そのまま省略して進める",type:"motive"},
      {text:"確認しなくても進められる状況なので、省略する",type:"opportunity"},
      {text:"この程度なら問題ないと思い、省略する",type:"rationalization"}
    ]
  },
  {
    cat:"正当化",
    text:"チェック作業を途中まで進めたところで、一度中断しました。<br>あなたならどこから再開しますか？",
    choices:[
      {text:"時間を優先して、続きからそのまま再開する",type:"motive"},
      {text:"中断しても進められる状況なので、そのまま再開する",type:"opportunity"},
      {text:"自分の記憶を頼りに、続きから再開する",type:"rationalization"}
    ]
  },
  {
    cat:"機会",
    text:"普段やっている作業に、明確なルールや手順がありません。<br>あなたならどうしますか？",
    choices:[
      {text:"必要だと思うが、言い出しにくくそのままにする",type:"motive"},
      {text:"ルールがなくても回っているので、そのままにする",type:"opportunity"},
      {text:"周囲と同じやり方なら問題ないと思う",type:"rationalization"}
    ]
  },
  {
    cat:"機会",
    text:"作業中に小さな異常に気づきましたが、大きな問題には見えません。<br>あなたならどうしますか？",
    choices:[
      {text:"気になるが、報告しづらくそのままにする",type:"motive"},
      {text:"見つかりにくそうなので、そのままにする",type:"opportunity"},
      {text:"大したことではないと思い、そのままにする",type:"rationalization"}
    ]
  }
];

let i=0,m=0,o=0,r=0,answers=[];

function start(){
  const dept = document.getElementById('dept').value;
  if(!dept){
    alert('部署を選択してください');
    return;
  }
  document.getElementById('startBtn').disabled = true;
  document.getElementById('startCard').style.display='none';
  document.getElementById('quiz').style.display='block';
  show();
}

function show(){
  const q=questions[i];
  const p=Math.round((i/questions.length)*100);
  let html=`<div class='quiz-head'><div class='quiz-index'>Q${i+1} / ${questions.length}</div></div>`;
  html+=`<div class='progress'><div class='progress-fill' style='width:${p}%'></div></div>`;
  html+=`<h2 class='question-title'>${q.text}</h2>`;
  html+=`<p class='question-sub'>選択する回答は正解がありません。<br><strong>追い込まれた状況で・・・</strong><br>
          不正するなら、どの不正か、最も自分の行動に近いものを直感で選んでください。</p>`;
  q.choices.forEach(c=>{
    html+=`<div class='choice' onclick="ans('${c.type}','${c.text.replace(/'/g, "\\'")}')">${c.text}</div>`;
  });
  document.getElementById('quiz').innerHTML=html;
}

function ans(type,text){
  answers.push({q:i+1,answer:text,type});
  if(type==='motive')m+=1;
  if(type==='opportunity')o+=1;
  if(type==='rationalization')r+=1;
  i++;
  if(i<questions.length){show()}else{finish()}
}

function drawRadar(){
  const c=document.getElementById('radar');
  const ctx=c.getContext('2d');
  const data=[m,o,r];
  const labels=['動機','機会','正当化'];
  const max=questions.length;
  const cx=160, cy=160, rad=110;
  ctx.clearRect(0,0,320,320);

  for(let layer=1; layer<=4; layer++){
    const rr = rad * (layer/4);
    ctx.beginPath();
    for(let j=0;j<3;j++){
      const a=(Math.PI*2/3*j)-Math.PI/2;
      const x=cx+rr*Math.cos(a);
      const y=cy+rr*Math.sin(a);
      if(j===0){ctx.moveTo(x,y)} else {ctx.lineTo(x,y)}
    }
    ctx.closePath();
    ctx.strokeStyle='#e5e7eb';
    ctx.stroke();
  }

  for(let j=0;j<3;j++){
    const a=(Math.PI*2/3*j)-Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+rad*Math.cos(a),cy+rad*Math.sin(a));
    ctx.strokeStyle='#d1d5db';
    ctx.stroke();
    ctx.fillStyle='#374151';
    ctx.font='14px sans-serif';
    ctx.textAlign='center';
    ctx.fillText(labels[j],cx+(rad+22)*Math.cos(a),cy+(rad+22)*Math.sin(a));
  }

  ctx.beginPath();
  data.forEach((v,j)=>{
    const a=(Math.PI*2/3*j)-Math.PI/2;
    const rr=rad*(v/max);
    const x=cx+rr*Math.cos(a);
    const y=cy+rr*Math.sin(a);
    if(j===0){ctx.moveTo(x,y)} else {ctx.lineTo(x,y)}
  });
  ctx.closePath();
  ctx.fillStyle='rgba(37,99,235,.22)';
  ctx.fill();
  ctx.strokeStyle='#2563eb';
  ctx.lineWidth=2;
  ctx.stroke();
}

function finish(){
  document.getElementById('quiz').style.display='none';

  let strongest='';
  let catchCopy='';
  let detail='';

  if((m===o && m>r) || (m===r && m>o) || (o===r && o>m) || (m===o && o===r)){
    strongest='バランス';
    catchCopy='状況影響型';
    detail='特定の一つの傾向に偏るというより、その場の人・環境・思い込みの影響を幅広く受けやすいタイプです。場面ごとに判断の軸が変わりやすく、対応に一貫性が出にくい傾向があります。';
  } else if(m>o && m>r){
    strongest='動機';
    catchCopy='流されやすい判断タイプ';
    detail='周囲の空気や人間関係を優先しやすく、本来確認すべき場面でもその場の流れに合わせて判断してしまう傾向があります。';
  } else if(o>m && o>r){
    strongest='機会';
    catchCopy='環境依存タイプ';
    detail='時間不足や確認漏れ、ルールの曖昧さなど、環境に隙があると判断が緩みやすい傾向があります。';
  } else {
    strongest='正当化';
    catchCopy='慣れ優先タイプ';
    detail='過去の経験や慣れを理由に「このくらいなら大丈夫」と考えやすく、確認や報告の優先度が下がる傾向があります。';
  }

  const totalQuestions = questions.length;

  const detailText =
    strongest === 'バランス'
      ? 'あなたは、相手・状況・環境によって判断の根拠が変わりやすい傾向があります。極端な偏りはない一方で、場面によって動機・機会・正当化のどれにも寄り得るため、判断基準を自分の中で明確に持つことが大切です。'
      : strongest === '動機'
      ? 'あなたは「間違っているかもしれない」と感じても、その場の人間関係や圧力を優先してしまう可能性があります。特に、上司や先輩が関わる場面では、違和感があっても止めづらくなることがあります。'
      : strongest === '機会'
      ? 'あなたは「確認不足でも進められてしまう」「ルールが曖昧でも作業できてしまう」といった環境要因の影響を受けやすい傾向があります。仕組みの隙が判断の甘さにつながりやすいタイプです。'
      : 'あなたは「過去に問題がなかった」「このくらいは大丈夫」という感覚で、自分の判断を補強しやすい傾向があります。慣れや経験が強みになる一方で、確認不足の温床になることがあります。';

  const riskItems =
    strongest === 'バランス'
      ? [
          '場面ごとに判断基準が変わり、対応がブレやすい',
          '人・環境・思い込みのどれにも影響を受けやすい',
          '一見柔軟だが、再現性の低い対応になりやすい'
        ]
      : [
          '違和感があっても、その場の流れを優先してしまう',
          '「いつもこうしている」を理由に確認を省略してしまう',
          '軽微だと判断して報告や記録を後回しにしてしまう'
        ];

  const actionItems =
    strongest === 'バランス'
      ? [
          '判断基準を「迷ったら確認」に固定する',
          '相手や状況ではなく、手順・ルールを優先する癖をつける',
          '場面ごとに対応を変えず、同じ基準で判断する',
          '迷いが出た場面を振り返り、自分のクセを言語化する'
        ]
      : [
          '迷ったときは、まず一度止めて確認する',
          '口頭の慣習より、手順書や記録を優先する',
          '例外対応はその場で終わらせず、共有・標準化する',
          '小さな違和感でも、報告や相談につなげる'
        ];

  const nextPoint =
    strongest === 'バランス'
      ? 'この結果は、良い・悪いを決めるものではありません。バランスタイプは一見偏りが少なく見えますが、そのぶん場面によって判断軸が変わりやすい可能性があります。毎回同じ基準で判断できる状態を目指すことが重要です。'
      : 'この結果は、良い・悪いを決めるものではありません。今の自分がどこで判断を崩しやすいかを知り、次の行動を変えるためのヒントです。特にスコアが高かった要素は、現場でのミスや見落としの起点になりやすいため、意識的に対策することで再発防止につながります。';

  document.getElementById('result').style.display='block';
  document.getElementById('result').innerHTML=`
    <div class='result-wrap'>
      <div class='result-hero'>
        <div class='badge'>診断結果</div>
        <h2 class='result-title'>あなたは「${strongest}タイプ」です</h2>
        <p class='result-copy'><b>${catchCopy}</b>。${detail}</p>
        <div class='chart-wrap'><canvas id='radar' width='320' height='320'></canvas></div>
      </div>

      <div class='card'>
        <h3 class='section-title'>■ あなたの傾向の詳細</h3>
        <p class='small'>${detailText}</p>
      </div>

      <div class='card'>
        <h3 class='section-title'>■ よくあるリスクパターン</h3>
        <ul class='bullets'>${riskItems.map(item => `<li>${item}</li>`).join('')}</ul>
      </div>

      <div class='card'>
        <h3 class='section-title'>■ 改善アクション（具体）</h3>
        <ul class='bullets'>${actionItems.map(item => `<li>${item}</li>`).join('')}</ul>
      </div>

      <div class='grid'>
        <div class='score-card'>
          <div class='score-head'><div class='score-name'>動機</div><div class='score-val'>${m} / ${totalQuestions}</div></div>
          <div class='bar'><div class='fill' style='width:${Math.min((m/totalQuestions)*100,100)}%'></div></div>
          <div class='small'>人間関係や空気、プレッシャーによって判断がぶれやすい傾向。</div>
        </div>
        <div class='score-card'>
          <div class='score-head'><div class='score-name'>機会</div><div class='score-val'>${o} / ${totalQuestions}</div></div>
          <div class='bar'><div class='fill' style='width:${Math.min((o/totalQuestions)*100,100)}%'></div></div>
          <div class='small'>確認不足、仕組みの曖昧さ、時間制約など環境面の影響を受けやすい傾向。</div>
        </div>
        <div class='score-card'>
          <div class='score-head'><div class='score-name'>正当化</div><div class='score-val'>${r} / ${totalQuestions}</div></div>
          <div class='bar'><div class='fill' style='width:${Math.min((r/totalQuestions)*100,100)}%'></div></div>
          <div class='small'>慣れや経験を根拠に、自分の判断を「大丈夫」と補強しやすい傾向。</div>
        </div>
      </div>

      <div class='card'>
        <h3 class='section-title'>■ 次に活かすポイント</h3>
        <p class='small'>${nextPoint}</p>
      </div>
    </div>`;

  drawRadar();

  fetch(GAS_WEB_APP_URL, {
    method:'POST',
    body:JSON.stringify({
      dept:document.getElementById('dept').value || '未入力',
      motive:m,
      opportunity:o,
      rationalization:r,
      strongest,
      answers
    })
  });
}
</script>
</body>
</html>
